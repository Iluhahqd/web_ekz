{% macro book_form(book, genres) %}
    <label>
        Название
        <input type="text" name="title" required value="{{ request.form.get('title', book.title if book else '') }}">
    </label>
    <label>
        Краткое описание
        <textarea name="description" rows="8" required>{{ request.form.get('description', book.description if book else '') }}</textarea>
    </label>
    <div class="form-grid">
        <label>
            Год
            <input type="number" name="year" min="1" max="2100" required value="{{ request.form.get('year', book.year if book else '') }}">
        </label>
        <label>
            Объём, страниц
            <input type="number" name="pages" min="1" required value="{{ request.form.get('pages', book.pages if book else '') }}">
        </label>
    </div>
    <label>
        Издательство
        <input type="text" name="publisher" required value="{{ request.form.get('publisher', book.publisher if book else '') }}">
    </label>
    <label>
        Автор
        <input type="text" name="author" required value="{{ request.form.get('author', book.author if book else '') }}">
    </label>
    <label>
        Жанры через запятую
        <input type="text" name="genres" required value="{{ request.form.get('genres', genres) }}">
    </label>
    <div class="actions">
        <button class="button" type="submit">Сохранить</button>
        <a class="button muted" href="{{ url_for('index') }}">Отмена</a>
    </div>
{% endmacro %}
